name: Tests & Analysis

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 1 — Code Style (Pint)
  # ─────────────────────────────────────────────────────────────────────────
  pint:
    name: Code Style (Pint)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, curl, openssl, pdo, pdo_sqlite, sqlite3, zip, fileinfo, intl
          coverage: none
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: pint-php8.3-laravel12-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            pint-php8.3-laravel12-

      - name: Install dependencies
        run: |
          composer install \
            --prefer-dist \
            --no-interaction \
            --no-progress \
            --no-scripts \
            --ansi

      - name: Run Pint (code style check)
        run: vendor/bin/pint --test --ansi

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 2 — PHPStan Static Analysis
  # ─────────────────────────────────────────────────────────────────────────
  phpstan:
    name: PHPStan (Level 8)
    runs-on: ubuntu-latest
    needs: pint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, curl, openssl, pdo, pdo_sqlite, sqlite3, zip, fileinfo, intl
          coverage: none
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: phpstan-php8.3-laravel12-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            phpstan-php8.3-laravel12-

      - name: Install dependencies
        run: |
          composer install \
            --prefer-dist \
            --no-interaction \
            --no-progress \
            --ansi

      - name: Cache PHPStan result cache
        uses: actions/cache@v4
        with:
          path: .phpstan-cache
          key: phpstan-result-${{ github.ref }}-${{ hashFiles('src/**/*.php') }}
          restore-keys: |
            phpstan-result-${{ github.ref }}-

      - name: Run PHPStan static analysis
        run: |
          vendor/bin/phpstan analyse \
            --configuration=phpstan.neon \
            --no-progress \
            --ansi \
            --memory-limit=512M

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 3 — Test Suite (matrix: PHP 8.3 / 8.4 / 8.5 × Laravel 12)
  # ─────────────────────────────────────────────────────────────────────────
  tests:
    name: PHP ${{ matrix.php }} — Laravel ${{ matrix.laravel }}
    runs-on: ubuntu-latest
    needs: [ pint, phpstan ]

    strategy:
      fail-fast: false
      matrix:
        php: [ '8.3', '8.4', '8.5' ]
        laravel: [ '12.*' ]
        stability: [ prefer-stable ]
        include:
          - laravel: '12.*'
            testbench: '10.*'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, xml, curl, openssl, pdo, pdo_sqlite, sqlite3, zip, fileinfo, intl
          coverage: none
          tools: composer:v2
          ini-values: memory_limit=512M

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: test-php${{ matrix.php }}-laravel${{ matrix.laravel }}-${{ matrix.stability }}-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            test-php${{ matrix.php }}-laravel${{ matrix.laravel }}-${{ matrix.stability }}-
            test-php${{ matrix.php }}-laravel${{ matrix.laravel }}-

      - name: Install dependencies
        run: |
          composer require \
            "laravel/framework:${{ matrix.laravel }}" \
            "orchestra/testbench:${{ matrix.testbench }}" \
            --no-interaction \
            --no-update \
            --dev \
            --ansi

          composer update \
            --${{ matrix.stability }} \
            --prefer-dist \
            --no-interaction \
            --no-progress \
            --ansi

      - name: Run Unit tests
        run: |
          vendor/bin/phpunit \
            --testsuite Unit \
            --no-coverage \
            --colors=always \
            --display-warnings \
            --display-deprecations

      - name: Run Feature tests
        run: |
          vendor/bin/phpunit \
            --testsuite Feature \
            --no-coverage \
            --colors=always \
            --display-warnings \
            --display-deprecations

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 4 — Full Test Suite with Coverage + Codecov Upload
  # Runs on PHP 8.3 × Laravel 12
  # ─────────────────────────────────────────────────────────────────────────
  coverage:
    name: Coverage (PHP 8.3 × Laravel 12)
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.3 with Xdebug
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, curl, openssl, pdo, pdo_sqlite, sqlite3, zip, fileinfo, intl
          coverage: xdebug
          tools: composer:v2
          ini-values: memory_limit=512M, xdebug.mode=coverage

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: coverage-php8.3-laravel12-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            coverage-php8.3-laravel12-

      - name: Install dependencies
        run: |
          composer require \
            "laravel/framework:12.*" \
            "orchestra/testbench:10.*" \
            --no-interaction \
            --no-update \
            --dev \
            --ansi

          composer update \
            --prefer-stable \
            --prefer-dist \
            --no-interaction \
            --no-progress \
            --ansi

      - name: Run full test suite with coverage
        env:
          XDEBUG_MODE: coverage
        run: |
          vendor/bin/phpunit \
            --coverage-clover=coverage.xml \
            --coverage-text \
            --colors=always

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: unittests
          name: laravel-agent-board
          fail_ci_if_error: false
          verbose: true

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 5 — Security Audit (runs independently, does not block merges)
  # ─────────────────────────────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, curl, openssl
          coverage: none
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: security-php8.3-laravel12-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            security-php8.3-laravel12-

      - name: Install production dependencies only
        run: |
          composer install \
            --prefer-dist \
            --no-interaction \
            --no-dev \
            --no-progress \
            --ansi

      - name: Audit production dependencies
        run: composer audit --no-dev --format=json --locked || true

      - name: Install all dependencies for full audit
        run: |
          composer install \
            --prefer-dist \
            --no-interaction \
            --no-progress \
            --ansi

      - name: Audit all dependencies (including dev)
        run: composer audit --format=json --locked
